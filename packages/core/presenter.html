<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Presenter View</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100vh; overflow: hidden; background: #0d0f14; font-family: 'Inter', -apple-system, sans-serif; color: #fff; -webkit-font-smoothing: antialiased; }

    #layout { display: grid; grid-template-columns: 1fr 340px; grid-template-rows: 1fr auto; height: 100vh; gap: 0; }

    /* ── Current slide ── */
    #current-wrap {
      grid-row: 1; grid-column: 1;
      display: flex; align-items: center; justify-content: center;
      background: #181a22; position: relative; overflow: hidden;
      border-right: 1px solid rgba(255,255,255,0.07);
    }
    #current-frame { border: none; width: 1280px; height: 720px; display: block; transform-origin: center center; }

    /* ── Right panel ── */
    #right-panel { grid-row: 1; grid-column: 2; display: flex; flex-direction: column; background: #13151c; border-left: 1px solid rgba(255,255,255,0.07); }

    /* ── Next slide ── */
    #next-section { flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 12px; }
    .panel-label { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 8px; }
    #next-wrap { width: 100%; aspect-ratio: 16/9; background: #0d0f14; border-radius: 6px; overflow: hidden; position: relative; }
    #next-frame { border: none; width: 1280px; height: 720px; display: block; transform-origin: top left; pointer-events: none; }
    #next-label { font-size: 0.7rem; color: rgba(255,255,255,0.35); margin-top: 6px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Notes ── */
    #notes-section { flex: 1; display: flex; flex-direction: column; padding: 12px; min-height: 0; }
    #notes-text { flex: 1; overflow-y: auto; font-size: 0.875rem; line-height: 1.65; color: rgba(255,255,255,0.65); white-space: pre-wrap; min-height: 0; }
    #notes-text::-webkit-scrollbar { width: 4px; }
    #notes-text::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    #notes-placeholder { color: rgba(255,255,255,0.18); font-style: italic; font-size: 0.8rem; }

    /* ── Bottom bar ── */
    #bar {
      grid-row: 2; grid-column: 1 / -1;
      display: flex; align-items: center; gap: 2rem;
      padding: 0 1.5rem; height: 48px;
      background: #0a0b10; border-top: 1px solid rgba(255,255,255,0.07);
    }
    #bar-timer { font-family: 'SF Mono','Fira Code',monospace; font-size: 1.1rem; font-weight: 700; color: #34D399; min-width: 70px; cursor: pointer; user-select: none; }
    #bar-timer.paused { color: rgba(251,146,60,0.85); }
    #bar-timer.stopped { color: rgba(255,255,255,0.3); }
    #bar-counter { font-size: 0.8rem; font-weight: 700; color: rgba(255,255,255,0.5); }
    #bar-title { font-size: 0.75rem; color: rgba(255,255,255,0.25); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    #bar-hint { font-size: 0.62rem; color: rgba(255,255,255,0.18); flex-shrink: 0; }
    .bar-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.1); flex-shrink: 0; }

    #waiting { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 12px; color: rgba(255,255,255,0.3); font-size: 0.85rem; }
    #waiting p { font-size: 0.7rem; color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

<div id="waiting">
  <span>Waiting for presentation window…</span>
  <p>Open fuckSlides and press P to connect.</p>
</div>

<div id="layout" style="display:none">
  <div id="current-wrap">
    <iframe id="current-frame" scrolling="no"></iframe>
  </div>

  <div id="right-panel">
    <div id="next-section">
      <div class="panel-label">Up next</div>
      <div id="next-wrap">
        <iframe id="next-frame" scrolling="no"></iframe>
      </div>
      <div id="next-label">—</div>
    </div>
    <div id="notes-section">
      <div class="panel-label">Notes</div>
      <div id="notes-text"><span id="notes-placeholder">No notes for this slide.</span></div>
    </div>
  </div>

  <div id="bar">
    <span id="bar-timer" class="stopped">00:00</span>
    <span class="bar-dot"></span>
    <span id="bar-counter">—</span>
    <span class="bar-dot"></span>
    <span id="bar-title"></span>
    <span id="bar-hint">P to open · C timer · R reset</span>
  </div>
</div>

<script>
'use strict';

const layout   = document.getElementById('layout');
const waiting  = document.getElementById('waiting');
const curFrame = document.getElementById('current-frame');
const nxtFrame = document.getElementById('next-frame');
const nxtWrap  = document.getElementById('next-wrap');
const nxtLabel = document.getElementById('next-label');
const notesEl  = document.getElementById('notes-text');
const placeholder = document.getElementById('notes-placeholder');
const barTimer = document.getElementById('bar-timer');
const barCounter = document.getElementById('bar-counter');
const barTitle   = document.getElementById('bar-title');

let timerRunning = false, timerOffset = 0, timerStart = 0, timerInterval = null;
let connected = false;

function fmtTime(ms) {
  const m = Math.floor(ms / 60000), s = Math.floor((ms % 60000) / 1000);
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function timerTick() {
  barTimer.textContent = fmtTime(timerOffset + (Date.now() - timerStart));
}

function scaleFrame(iframe, wrap) {
  const ro = new ResizeObserver(() => {
    const w = wrap.offsetWidth, h = wrap.offsetHeight;
    const scale = Math.min(w / 1280, h / 720);
    iframe.style.transform = `scale(${scale})`;
    iframe.style.marginLeft = ((w - 1280 * scale) / 2) + 'px';
    iframe.style.marginTop  = ((h -  720 * scale) / 2) + 'px';
  });
  ro.observe(wrap);
}

function scaleCurrentFrame() {
  const wrap = document.getElementById('current-wrap');
  const ro = new ResizeObserver(() => {
    const w = wrap.offsetWidth, h = wrap.offsetHeight;
    const scale = Math.min(w / 1280, h / 720);
    curFrame.style.transform = `scale(${scale})`;
  });
  ro.observe(wrap);
}

scaleCurrentFrame();
scaleFrame(nxtFrame, nxtWrap);

const bc = new BroadcastChannel('fuckslides-presenter');
bc.onmessage = ({ data }) => {
  if (data.type !== 'state') return;

  if (!connected) {
    connected = true;
    waiting.style.display = 'none';
    layout.style.display = 'grid';
  }

  const { idx, slides, labels, notes, timerRunning: tr, timerMs } = data;

  // Current slide
  const curSlide = slides[idx];
  if (curFrame.src !== location.origin + '/' + curSlide) curFrame.src = curSlide;

  // Next slide
  const nxtSlide = slides[idx + 1];
  if (nxtSlide) {
    if (nxtFrame.src !== location.origin + '/' + nxtSlide) nxtFrame.src = nxtSlide;
    nxtLabel.textContent = labels[idx + 1] || nxtSlide.replace('.html','');
    nxtFrame.style.display = 'block';
  } else {
    nxtFrame.src = 'about:blank';
    nxtLabel.textContent = '(last slide)';
  }

  // Notes
  const note = (notes && notes[curSlide]) || '';
  if (note) { notesEl.textContent = note; placeholder && placeholder.remove(); }
  else { notesEl.innerHTML = '<span id="notes-placeholder" style="color:rgba(255,255,255,0.18);font-style:italic;font-size:0.8rem">No notes for this slide.</span>'; }

  // Counter
  barCounter.textContent = (idx + 1) + ' / ' + slides.length;
  barTitle.textContent = labels[idx] || curSlide.replace('.html','');

  // Timer sync
  timerOffset = timerMs || 0;
  if (tr && !timerRunning) {
    timerRunning = true; timerStart = Date.now() - timerOffset;
    timerInterval = setInterval(timerTick, 500);
    barTimer.classList.remove('stopped','paused'); barTimer.classList.add('running');
  } else if (!tr && timerRunning) {
    clearInterval(timerInterval); timerRunning = false;
    barTimer.textContent = fmtTime(timerOffset);
    barTimer.classList.remove('running'); barTimer.classList.add('paused');
  }
  if (!tr) barTimer.textContent = fmtTime(timerOffset);
};
</script>
</body>
</html>
