name = "fslides-gateway"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Custom domain (configure after the fslides.dev zone is on Cloudflare):
routes = [
  { pattern = "api.fslides.dev", custom_domain = true }
]

# Non-secret config
[vars]
ALLOWED_ORIGIN_SUFFIXES = ".github.io,localhost,127.0.0.1"

# Secrets (set with `wrangler secret put <NAME>`):
#   GITHUB_CLIENT_ID      — from the "fslides" GitHub App
#   GITHUB_CLIENT_SECRET  — from the "fslides" GitHub App
